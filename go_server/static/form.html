<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go JSON Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .card { border-radius: 15px; }
        .btn-success { border-radius: 8px; font-weight: 600; }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0">JSON Data Submission</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="jsonForm">
                            <div class="mb-4">
                                <label for="name" class="form-label fw-bold">Full Name</label>
                                <input type="text" name="name" class="form-control form-control-lg" id="name" placeholder="John Doe" required>
                                <div class="form-text">We'll send this to the Go server as JSON.</div>
                            </div>
                            
                            <button type="submit" id="submitBtn" class="btn btn-success btn-lg w-100">
                                <span id="btnText">Send Request</span>
                            </button>
                        </form>

                        <div id="responseMessage" class="mt-4 alert d-none animate__animated animate__fadeIn"></div>
                    </div>
                    <div class="card-footer text-center bg-transparent border-0 pb-4">
                        <a href="/" class="text-muted text-decoration-none small">← Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('jsonForm');
        const responseDiv = document.getElementById('responseMessage');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // UI Feedback: Loading state
            submitBtn.disabled = true;
            btnText.textContent = "Processing...";
            responseDiv.classList.add('d-none');

            const formData = new FormData(form);
            const payload = {
                name: formData.get('name')
            };

            try {
                const response = await fetch('/form', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                // We expect Go to send JSON back (e.g., {"message": "Success!"} or {"error": "Invalid"})
                const result = await response.json();

                responseDiv.classList.remove('d-none', 'alert-danger', 'alert-success');
                
                if (response.ok) {
                    responseDiv.classList.add('alert-success');
                    responseDiv.innerHTML = `<strong>Success!</strong> ${result.message}`;
                } else {
                    responseDiv.classList.add('alert-danger');
                    responseDiv.innerHTML = `<strong>Error:</strong> ${result.error || 'Validation failed'}`;
                }
            } catch (error) {
                responseDiv.classList.remove('d-none');
                responseDiv.classList.add('alert-danger');
                responseDiv.textContent = "Critical Error: Could not connect to Go backend.";
            } finally {
                // Reset button state
                submitBtn.disabled = false;
                btnText.textContent = "Send Request";
            }
        });
    </script>
</body>
</html>
